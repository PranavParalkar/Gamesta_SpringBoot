AWSTemplateFormatVersion: '2010-09-09'
Description: Activity-3 low-cost CI/CD stack (CodePipeline + one CodeBuild deployer)

Parameters:
  ProjectName:
    Type: String
    Default: gamesta
  EnvironmentName:
    Type: String
    Default: lite
  ConnectionArn:
    Type: String
    Description: CodeStar connection ARN for GitHub
  FullRepositoryId:
    Type: String
    Description: owner/repo
  BranchName:
    Type: String
    Default: main
  FrontendBucketName:
    Type: String
  Ec2InstanceId:
    Type: String
  ViteApiBaseUrl:
    Type: String
    Default: http://api.gamesta.in
  DbPassword:
    Type: String
    NoEcho: true
    Default: changeme123
  AdminSecret:
    Type: String
    NoEcho: true
    Default: changeme

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: pipeline-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref ConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt LiteBuildProject.Arn

  BuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: build-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource: '*'
              - Effect: Allow
                Action:
                  - ssm:DescribeInstanceInformation
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: '*'

  LiteBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-build-deploy
      ServiceRole: !GetAtt BuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: FRONTEND_BUCKET
            Value: !Ref FrontendBucketName
          - Name: API_BASE_URL
            Value: !Ref ViteApiBaseUrl
          - Name: EC2_INSTANCE_ID
            Value: !Ref Ec2InstanceId
          - Name: REPO_CLONE_URL
            Value: !Sub https://github.com/${FullRepositoryId}.git
          - Name: BRANCH_NAME
            Value: !Ref BranchName
          - Name: DB_PASSWORD
            Value: !Ref DbPassword
          - Name: ADMIN_SECRET
            Value: !Ref AdminSecret
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2

          phases:
            install:
              runtime-versions:
                nodejs: 20
                java: corretto17
              commands:
                - echo Installing dependencies for frontend...
                - cd src/frontend
                - npm ci --no-audit --no-fund
                - cd ../..
            build:
              commands:
                - echo Building frontend with API URL $API_BASE_URL
                - cd src/frontend
                - export VITE_API_BASE_URL=$API_BASE_URL
                - npm run build
                - cd ../..
            post_build:
              commands:
                - echo Syncing frontend dist to S3 bucket $FRONTEND_BUCKET
                - aws s3 sync src/frontend/dist s3://$FRONTEND_BUCKET --delete
                - echo Preparing backend deployment command for EC2 instance $EC2_INSTANCE_ID
                - echo Verifying EC2 instance is online in SSM...
                - |
                  MANAGED_INSTANCE_ID=$(aws ssm describe-instance-information \
                    --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
                    --query "InstanceInformationList[0].InstanceId" \
                    --output text 2>/dev/null || true)
                - |
                  if [ -z "$MANAGED_INSTANCE_ID" ] || [ "$MANAGED_INSTANCE_ID" = "None" ]; then
                    echo "EC2 instance $EC2_INSTANCE_ID is not available in SSM."
                    echo "Check: instance profile has AmazonSSMManagedInstanceCore, instance is running, and outbound internet access works."
                    exit 1
                  fi
                - DB_PASSWORD_B64=$(printf '%s' "$DB_PASSWORD" | base64 | tr -d '\n')
                - ADMIN_SECRET_B64=$(printf '%s' "$ADMIN_SECRET" | base64 | tr -d '\n')
                - |
                  cat > ssm-commands.json <<EOF
                  {
                    "commands": [
                      "set -e",
                      "sudo mkdir -p /opt/gamesta",
                      "if [ ! -d /opt/gamesta/.git ]; then sudo git clone ${REPO_CLONE_URL} /opt/gamesta; else sudo git -C /opt/gamesta fetch --all; fi",
                      "sudo git -C /opt/gamesta checkout ${BRANCH_NAME}",
                      "sudo git -C /opt/gamesta reset --hard origin/${BRANCH_NAME}",
                      "echo MYSQL_ROOT_PASSWORD=$(echo ${DB_PASSWORD_B64} | base64 -d) | sudo tee /opt/gamesta/.env",
                      "echo MYSQL_DATABASE=gamesta | sudo tee -a /opt/gamesta/.env",
                      "echo ADMIN_SECRET=$(echo ${ADMIN_SECRET_B64} | base64 -d) | sudo tee -a /opt/gamesta/.env",
                      "sudo docker compose -f /opt/gamesta/docker-compose.ec2.yml --env-file /opt/gamesta/.env up -d --build --remove-orphans",
                      "sudo docker ps"
                    ]
                  }
                  EOF
                - |
                  COMMAND_ID=$(aws ssm send-command \
                    --instance-ids "$EC2_INSTANCE_ID" \
                    --document-name "AWS-RunShellScript" \
                    --comment "Gamesta lite deploy from CodeBuild" \
                    --parameters file://ssm-commands.json \
                    --query "Command.CommandId" \
                    --output text)
                - echo SSM command sent with ID $COMMAND_ID
                - |
                  for i in $(seq 1 60); do
                    STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo "Pending")
                    echo "SSM status: $STATUS"
                    if [ "$STATUS" = "Success" ]; then
                      break
                    fi
                    if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
                      aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "StandardErrorContent" --output text || true
                      exit 1
                    fi
                    sleep 10
                  done
                - aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "StandardOutputContent" --output text || true

          artifacts:
            files:
              - '**/*'
            discard-paths: yes

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-pipeline
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: SourceFromGitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                ConnectionArn: !Ref ConnectionArn
                FullRepositoryId: !Ref FullRepositoryId
                BranchName: !Ref BranchName
                DetectChanges: 'true'
              RunOrder: 1
        - Name: BuildAndDeploy
          Actions:
            - Name: BuildFrontendAndDeployEc2
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref LiteBuildProject
              RunOrder: 1

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  BuildProjectName:
    Value: !Ref LiteBuildProject
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
